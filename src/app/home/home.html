<div class="container mt-4">
  <ng-container *ngIf="sections | async as sectionsData">
    <div *ngFor="let section of sectionsData">
      <h3 class="fw-bold mb-4 mt-5">{{ section.title }}</h3>
      <div class="row">
        <div
          class="col-md-3 mb-4"
          *ngFor="let item of section.items"
          [routerLink]="['/products', item.category]"
          style="cursor: pointer"
        >
          <div class="card shadow-sm border-0 rounded-4 p-3 text-center">
            <img [src]="item.image" class="img-fluid mb-3" alt="" />
            <p class="mb-1">{{ item.name }}</p>
            <span class="text-danger fw-bold">
              {{ item.offer }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </ng-container>
</div>
