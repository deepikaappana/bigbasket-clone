<div class="container mt-4">
  <ng-container *ngIf="filteredProducts$ | async as filteredProducts">
    <div class="row">

      <div class="col-lg-3 col-md-4 col-sm-6 mb-4"
           *ngFor="let product of filteredProducts">

        <div class="product-card">

          
          <span class="discount-badge">25% OFF</span>

          
          <div class="image-wrapper">
            <img [src]="product.image" alt="{{product.name}}">
          </div>

          
          <span class="time-badge">⏱ 10 MINS</span>

          
          <p class="brand">fresh!</p>

          
          <h6 class="product-title">{{ product.name }}</h6>

          
          <select class="form-select quantity-dropdown">
            <option>1 kg</option>

          </select>

          
          <div class="price-section">
            <span class="current-price">₹{{ product.price }}</span>
            <span class="old-price">₹150</span>
          </div>

          
          <button class="add-btn" (click)="addToCart(product)">Add</button>
        

        </div>

      </div>

    </div>

    <div *ngIf="filteredProducts.length === 0" class="text-center">
      No products found.
    </div>
  </ng-container>
</div>
